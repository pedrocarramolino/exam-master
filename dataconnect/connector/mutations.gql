# Mutations de ExamMaster.
#
# La lógica del simulador de examen se añade en la Fase 4, junto a esa feature.

# Sincroniza el perfil del usuario autenticado la primera vez que inicia sesión
# (y en updates de perfil). "auth.uid" impide que un usuario cree/edite el perfil de otro.
mutation UpsertUser($email: String!, $displayName: String) @auth(level: USER) {
  user_upsert(data: { id_expr: "auth.uid", email: $email, displayName: $displayName })
}

# --- Panel de administración ---
# Todas @auth(level: NO_ACCESS): nunca las llama el cliente, solo el Admin SDK
# desde Server Actions (que ya comprobó el rol ADMIN antes de invocarlas).

mutation CreateExamCategory($name: String!, $slug: String!, $description: String)
@auth(level: NO_ACCESS) {
  examCategory_insert(data: { name: $name, slug: $slug, description: $description })
}

mutation UpdateExamCategory(
  $categoryId: UUID!
  $name: String!
  $slug: String!
  $description: String
) @auth(level: NO_ACCESS) {
  examCategory_update(
    id: $categoryId
    data: { name: $name, slug: $slug, description: $description }
  )
}

mutation DeleteExamCategory($categoryId: UUID!) @auth(level: NO_ACCESS) {
  examCategory_delete(id: $categoryId)
}

mutation CreateExamGroup($categoryId: UUID!, $name: String!, $slug: String!)
@auth(level: NO_ACCESS) {
  examGroup_insert(data: { categoryId: $categoryId, name: $name, slug: $slug })
}

mutation UpdateExamGroup($groupId: UUID!, $name: String!, $slug: String!)
@auth(level: NO_ACCESS) {
  examGroup_update(id: $groupId, data: { name: $name, slug: $slug })
}

mutation DeleteExamGroup($groupId: UUID!) @auth(level: NO_ACCESS) {
  examGroup_delete(id: $groupId)
}

mutation CreateExamEdition($groupId: UUID!, $year: Int!, $label: String) @auth(level: NO_ACCESS) {
  examEdition_insert(data: { groupId: $groupId, year: $year, label: $label })
