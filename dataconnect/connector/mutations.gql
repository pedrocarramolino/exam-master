mutation CreateTopic($categoryId: UUID!, $name: String!) @auth(level: NO_ACCESS) {
  topic_insert(data: { categoryId: $categoryId, name: $name })
}

mutation DeleteTopic($topicId: UUID!) @auth(level: NO_ACCESS) {
  topic_delete(id: $topicId)
}

# Siempre 4 respuestas (requisito de producto): 4 slots explícitos en vez de una
# lista, porque el SDK generado todavía no soporta variables de tipo "_Data".
mutation CreateQuestion(
  $examId: UUID!
  $topicId: UUID
  $statement: String!
  $explanation: String
  $difficulty: QuestionDifficulty!
  $option1Text: String!
  $option1IsCorrect: Boolean!
  $option2Text: String!
  $option2IsCorrect: Boolean!
  $option3Text: String!
  $option3IsCorrect: Boolean!
  $option4Text: String!
  $option4IsCorrect: Boolean!
) @auth(level: NO_ACCESS) {
  question_insert(
    data: {
      examId: $examId
      topicId: $topicId
      statement: $statement
      explanation: $explanation
      difficulty: $difficulty
      answerOptions_on_question: [
        { text: $option1Text, isCorrect: $option1IsCorrect, position: 1 }
        { text: $option2Text, isCorrect: $option2IsCorrect, position: 2 }
        { text: $option3Text, isCorrect: $option3IsCorrect, position: 3 }
        { text: $option4Text, isCorrect: $option4IsCorrect, position: 4 }
      ]
    }
  )
}

mutation UpdateQuestion(
  $questionId: UUID!
  $topicId: UUID
  $statement: String!
  $explanation: String
  $difficulty: QuestionDifficulty!
) @auth(level: NO_ACCESS) {
  question_update(
    id: $questionId
    data: {
      topicId: $topicId
      statement: $statement
      explanation: $explanation
      difficulty: $difficulty
    }
  )
}

# Debe llamarse antes de DeleteQuestion: AnswerOption.question es obligatoria (NOT NULL),
# así que las opciones de la pregunta hay que borrarlas primero.
mutation DeleteAnswerOptionsByQuestion($questionId: UUID!) @auth(level: NO_ACCESS) {
  answerOption_deleteMany(where: { questionId: { eq: $questionId } })
}

mutation DeleteQuestion($questionId: UUID!) @auth(level: NO_ACCESS) {
  question_delete(id: $questionId)
}

mutation ReplaceAnswerOptions(
  $questionId: UUID!
  $option1Text: String!
  $option1IsCorrect: Boolean!
  $option2Text: String!
  $option2IsCorrect: Boolean!
  $option3Text: String!
  $option3IsCorrect: Boolean!
  $option4Text: String!
  $option4IsCorrect: Boolean!
) @auth(level: NO_ACCESS) {
  answerOption_deleteMany(where: { questionId: { eq: $questionId } })
  answerOption_insertMany(
    data: [
      { questionId: $questionId, text: $option1Text, isCorrect: $option1IsCorrect, position: 1 }
      { questionId: $questionId, text: $option2Text, isCorrect: $option2IsCorrect, position: 2 }
      { questionId: $questionId, text: $option3Text, isCorrect: $option3IsCorrect, position: 3 }
      { questionId: $questionId, text: $option4Text, isCorrect: $option4IsCorrect, position: 4 }
    ]
  )
}
